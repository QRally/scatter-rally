<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>SCATTER TEST</title>
    <style>
        :root { --bg: #050505; --card: #121212; --found: #28a745; --searching: #ffc107; --border: #333; }
        body { font-family: sans-serif; background: var(--bg); color: white; margin: 0; padding: 15px; }
        .header { text-align: center; padding: 20px; background: var(--card); border-radius: 15px; margin-bottom: 15px; border: 1px solid var(--border); }
        .radar-box { height: 120px; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #000; border-radius: 15px; border: 2px solid var(--border); margin-bottom: 15px; position: relative; overflow: hidden; }
        .status-text { font-size: 28px; font-weight: 900; z-index: 2; letter-spacing: 3px; }
        .control-card { background: var(--card); padding: 15px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; border-left: 6px solid #444; margin-bottom: 10px; }
        .control-card.found { border-left-color: var(--found); opacity: 0.6; }
        @keyframes radar { 0% { transform: scale(0.5); opacity: 1; } 100% { transform: scale(2); opacity: 0; } }
        .pulse { position: absolute; width: 100%; height: 100%; background: radial-gradient(circle, rgba(255,193,7,0.1) 0%, transparent 70%); animation: radar 2s infinite; }
    </style>
</head>
<body>

    <div class="header">
        <div id="carDisplay" style="color:var(--searching); font-weight:bold;">SCATTER ACTIVE</div>
        <div id="eventDisplay" style="font-size:20px; font-weight:bold;">ALED'S TEST RUN</div>
        <div id="gpsStatus" style="font-size: 11px; color: #555;">GPS: Initializing...</div>
    </div>

    <div class="radar-box">
        <div class="pulse"></div>
        <div id="radarStatus" class="status-text" style="color: var(--searching);">SEARCHING</div>
        <div id="pointsCount" style="font-size: 12px; color: #888; margin-top: 5px; z-index: 2;">0 / 0 FOUND</div>
    </div>

    <div id="list"></div>

<script>
    // 1. DATA (Hard-coded for immediate testing)
    const SCATTER_DATA = {
        points: [
            { id: "TEST 1", coords: "52.146921,-4.057032" },
            { id: "TEST 2", coords: "51.989107,-3.726333" },
            { id: "LIVING ROOM", coords: "0.000,0.000" } // Replace with your home coords!
        ]
    };

    let foundIds = new Set();

    function renderList() {
        const container = document.getElementById('list');
        container.innerHTML = '';
        SCATTER_DATA.points.forEach(c => {
            const isFound = foundIds.has(c.id);
            const card = document.createElement('div');
            card.className = `control-card ${isFound ? 'found' : ''}`;
            card.innerHTML = `<b>${c.id}</b><div>${isFound ? '✅' : '⭕'}</div>`;
            container.appendChild(card);
        });
        document.getElementById('pointsCount').innerText = `${foundIds.size} / ${SCATTER_DATA.points.length} TOTAL`;
    }

    function startTracking() {
        navigator.geolocation.watchPosition(pos => {
            const { latitude, longitude, accuracy } = pos.coords;
            document.getElementById('gpsStatus').innerText = `GPS ACCURACY: ${accuracy.toFixed(1)}m`;
            
            // Check points...
            SCATTER_DATA.points.forEach(c => {
                if (foundIds.has(c.id)) return;
                // Add distance math here if you want meters on screen
                // For now, let's just see the list appear!
            });
        }, (err) => {
            document.getElementById('gpsStatus').innerText = "GPS Error: " + err.message;
        }, { enableHighAccuracy: true });
    }

    // Initialize UI immediately
    renderList();
    startTracking();
</script>
</body>
</html>
