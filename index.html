<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>SCATTER MASTER v2.2</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --bg: #050505; --card: #121212; --found: #28a745; --searching: #ffc107; --border: #333; --accent: #007bff; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: var(--bg); color: white; margin: 0; padding: 15px; overflow-x: hidden; }
        
        #flash-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--found); opacity: 0; pointer-events: none;
            z-index: 9999; transition: opacity 0.1s;
        }
        .flash-active { opacity: 0.8 !important; }

        .header { text-align: center; padding: 15px; background: var(--card); border-radius: 15px 15px 0 0; border: 1px solid var(--border); border-bottom: none; }
        .stats-bar { display: flex; background: #1a1a1a; border: 1px solid var(--border); border-radius: 0 0 15px 15px; margin-bottom: 15px; overflow: hidden; }
        .stat-item { flex: 1; padding: 10px; text-align: center; border-right: 1px solid var(--border); }
        .stat-item:last-child { border-right: none; }
        .stat-label { font-size: 10px; color: #888; text-transform: uppercase; margin-bottom: 2px; }
        .stat-value { font-family: monospace; font-size: 18px; font-weight: bold; color: var(--accent); }
        
        .radar-box { height: 110px; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #000; border-radius: 15px; border: 2px solid var(--border); margin-bottom: 15px; position: relative; overflow: hidden; }
        .status-text { font-size: 26px; font-weight: 900; z-index: 2; letter-spacing: 2px; text-align: center; }
        
        .control-card { background: var(--card); padding: 15px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; border-left: 6px solid #444; margin-bottom: 10px; transition: all 0.3s; }
        .control-card.found { border-left-color: var(--found); background: #0a150a; }
        
        @keyframes success-glow {
            0% { box-shadow: 0 0 0px var(--found); }
            50% { box-shadow: 0 0 20px var(--found); }
            100% { box-shadow: 0 0 0px var(--found); }
        }
        .just-found { animation: success-glow 1s ease-in-out 2; border: 1px solid var(--found); }
    </style>
</head>
<body>
    <div id="flash-overlay"></div>
    
    <div class="header">
        <div id="carDisplay" class="car-num" style="color:var(--searching); font-weight:bold; font-size: 14px;">CONNECTING...</div>
        <div id="eventDisplay" class="event-title" style="font-size:20px; font-weight:900; margin: 5px 0;">SCATTER READY</div>
        <div id="gpsStatus" style="font-size: 11px; color: #555;">GPS: Initializing...</div>
    </div>
    
    <div class="stats-bar">
        <div class="stat-item"><div class="stat-label">Time Taken</div><div id="timerDisplay" class="stat-value">00:00:00</div></div>
        <div class="stat-item"><div class="stat-label">Odometer</div><div id="odoDisplay" class="stat-value">0.00 miles</div></div>
    </div>

    <div class="radar-box">
        <div id="radarStatus" class="status-text" style="color: var(--searching);">AWAITING START</div>
        <div id="pointsCount" style="font-size: 12px; color: #888; margin-top: 5px; z-index: 2;">0 / 12 FOUND</div>
    </div>

    <div id="list"></div>

    <audio id="sndFound" src="https://assets.mixkit.co/active_storage/sfx/2000/2000-preview.mp3" preload="auto"></audio>

<script>
    const SCATTER_DATA = {
        event_name: "GEOSCATTER",
        points: [
            { id: "START", coords: "53.24027,-4.35012" },
            { id: "Point 1", coords: "53.22726,-4.35090" },
            { id: "Point 2", coords: "53.23723,-4.32538" },
            { id: "Point 3", coords: "53.23879,-4.27434" },
            { id: "Point 4", coords: "53.26808,-4.35499" },
            { id: "Point 5", coords: "53.27972,-4.30706" },
            { id: "Point 6", coords: "53.25544,-4.28241" },
            { id: "Point 7", coords: "53.27864,-4.22196" },
            { id: "Point 8", coords: "53.19949,-4.30720" },
            { id: "Point 9", coords: "53.23048,-4.20930" },
            { id: "Point 10", coords: "53.26584,-4.17168" },
            { id: "FINISH", coords: "53.23248,-4.18202" }
        ]
    };

    const firebaseConfig = { databaseURL: "https://the-regulator-rally-default-rtdb.europe-west1.firebasedatabase.app" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let carNum = localStorage.getItem('active_car') || prompt("Enter Car #:", "1") || "0";
    localStorage.setItem('active_car', carNum);
    
    let foundIds = new Set(JSON.parse(localStorage.getItem('found_points_' + carNum) || "[]"));
    let totalMeters = parseFloat(localStorage.getItem('odo_m_' + carNum) || "0");
    let lastPos = null;
    let timerRunning = false;
    let startTime = localStorage.getItem('start_time_' + carNum);

    if (foundIds.has("START") && !foundIds.has("FINISH")) timerRunning = true;

    function triggerNoticeableFeedback(pointId) {
        const flash = document.getElementById('flash-overlay');
        flash.classList.add('flash-active');
        setTimeout(() => flash.classList.remove('flash-active'), 500);

        const audio = document.getElementById('sndFound');
        audio.play().catch(() => {});

        if (navigator.vibrate) navigator.vibrate([300, 100, 300]);

        const s = document.getElementById('radarStatus');
        s.innerText = pointId + " STAMPED!";
        s.style.color = "var(--found)";
        setTimeout(() => {
            s.innerText = foundIds.has("FINISH") ? "FINISHED" : "SEARCHING";
            s.style.color = foundIds.has("FINISH") ? "white" : "var(--searching)";
        }, 5000);
    }

    function updateTimer() {
        if (!timerRunning || foundIds.has("FINISH")) {
            if (foundIds.has("FINISH")) {
                document.getElementById('timerDisplay').innerText = localStorage.getItem('final_time_taken_' + carNum) || "00:00:00";
            }
            return;
        }
        const diff = Date.now() - startTime;
        const h = Math.floor(diff / 3600000).toString().padStart(2, '0');
        const m = Math.floor((diff % 3600000) / 60000).toString().padStart(2, '0');
        const s = Math.floor((diff % 60000) / 1000).toString().padStart(2, '0');
        const timeStr = `${h}:${m}:${s}`;
        document.getElementById('timerDisplay').innerText = timeStr;
        localStorage.setItem('final_time_taken_' + carNum, timeStr); 
    }
    setInterval(updateTimer, 1000);

    function renderList(newId = null) {
        const container = document.getElementById('list');
        container.innerHTML = '';
        const sorted = [...SCATTER_DATA.points].sort((a,b) => foundIds.has(a.id) - foundIds.has(b.id));
        sorted.forEach(c => {
            const isFound = foundIds.has(c.id);
            const card = document.createElement('div');
            card.className = `control-card ${isFound ? 'found' : ''} ${c.id === newId ? 'just-found' : ''}`;
            card.innerHTML = `<div><b style="font-size:18px;">${c.id}</b><div id="dist-${c.id}" style="font-size:13px; color:#888;">${isFound ? 'STAMPED' : 'LOCATING...'}</div></div><div style="font-size:24px;">${isFound ? '✅' : '⭕'}</div>`;
            container.appendChild(card);
        });
        document.getElementById('pointsCount').innerText = `${foundIds.size} / ${SCATTER_DATA.points.length} FOUND`;
        localStorage.setItem('found_points_' + carNum, JSON.stringify([...foundIds]));
    }

    function startTracking() {
        navigator.geolocation.watchPosition(pos => {
            const { latitude, longitude, accuracy } = pos.coords;
            document.getElementById('gpsStatus').innerText = `GPS ACCURACY: ${accuracy.toFixed(1)}m`;

            if (lastPos && foundIds.has("START") && !foundIds.has("FINISH")) {
                const move = calcDist(lastPos.lat, lastPos.lng, latitude, longitude);
                if (move > 2 && move < 150) { 
                    totalMeters += move;
                    localStorage.setItem('odo_m_' + carNum, totalMeters);
                    document.getElementById('odoDisplay').innerText = (totalMeters * 0.000621371).toFixed(2) + " miles";
                }
            }
            lastPos = { lat: latitude, lng: longitude };

            SCATTER_DATA.points.forEach(c => {
                if (foundIds.has(c.id)) return;
                const [pLat, pLng] = c.coords.split(',').map(Number);
                const distance = calcDist(latitude, longitude, pLat, pLng);

                if (document.getElementById(`dist-${c.id}`)) document.getElementById(`dist-${c.id}`).innerText = Math.round(distance) + "m away";
                
                if (distance < 60) {
                    foundIds.add(c.id);
                    if (c.id === "START") { startTime = Date.now(); localStorage.setItem('start_time_' + carNum, startTime); timerRunning = true; }
                    if (c.id === "FINISH") { timerRunning = false; }
                    
                    triggerNoticeableFeedback(c.id);
                    renderList(c.id);
                    
                    db.ref(SCATTER_DATA.event_name + '/car_' + carNum + '/' + c.id).set({
                        time_of_day: new Date().toLocaleTimeString(),
                        miles: (totalMeters * 0.000621371).toFixed(2),
                        elapsed_time: document.getElementById('timerDisplay').innerText,
                        timestamp: firebase.database.ServerValue.TIMESTAMP
                    });
                }
            });
        }, null, { enableHighAccuracy: true });
    }

    function calcDist(lat1, lon1, lat2, lon2) {
        const R = 6371e3;
        const dLat = (lat2-lat1)*Math.PI/180;
        const dLon = (lon2-lon1)*Math.PI/180;
        const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }

    document.getElementById('carDisplay').innerText = "CAR " + carNum + " ACTIVE";
    document.getElementById('eventDisplay').innerText = SCATTER_DATA.event_name.replace(/_/g, " ");
    document.getElementById('odoDisplay').innerText = (totalMeters * 0.000621371).toFixed(2) + " miles";
    
    db.ref(SCATTER_DATA.event_name + '/car_' + carNum).once('value', snapshot => {
        const data = snapshot.val();
        if(data) { Object.keys(data).forEach(id => foundIds.add(id)); if (foundIds.has("START") && !foundIds.has("FINISH")) timerRunning = true; renderList(); }
    });

    renderList();
    startTracking();
</script>
</body>
</html>
